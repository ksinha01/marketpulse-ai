name: marketpulse-worker

# Runs once daily, Mon-Fri, covering Indian market hours: starts 9:10 AM
# IST, stops at 3:08 PM IST. That's a single ~6-hour job — right at
# GitHub Actions' hard per-job cap of 6 hours. Rather than count a fixed
# duration in seconds from script start (which would eat into that budget
# via setup steps — checkout, pip/npm installs, login — before the loop
# even begins), the loop instead checks the actual wall-clock time each
# cycle and stops at a fixed cutoff (09:38 UTC = 3:08 PM IST). This is more
# robust against setup-time variance, and the 2-minute buffer before the
# true 6-hour boundary (3:10 PM IST) protects against the job getting
# forcibly killed mid-cycle if anything runs slightly long.
on:
  schedule:
    - cron: "40 3 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: marketpulse-worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: worker
        run: pip install -r requirements.txt

      - name: Install UiPath CLI and Orchestrator tool
        run: |
          npm install -g @uipath/cli
          uip tools install @uipath/orchestrator-tool

      - name: Log in to UiPath (non-interactive, client credentials)
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_TENANT_NAME: ${{ secrets.UIPATH_TENANT_NAME }}
        run: |
          uip login --client-id "$UIPATH_CLIENT_ID" --client-secret "$UIPATH_CLIENT_SECRET" --tenant "$UIPATH_TENANT_NAME" --scope "OR.Assets" --output json
          uip login status --output json

      - name: Configure git identity for snapshot commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Loop every 30s until 3:08 PM IST (09:38 UTC)
        working-directory: worker
        env:
          ASSET_KEY: ${{ secrets.ASSET_KEY }}
          ASSET_FOLDER_PATH: ${{ secrets.ASSET_FOLDER_PATH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          SNAPSHOT_FILE: ${{ github.workspace }}/data/snapshot.json
        run: |
          # Always target the same daily cutoff (09:38 UTC = 3:08 PM IST),
          # regardless of whether this run was triggered by the cron or
          # manually — so a manual dispatch during market hours behaves
          # exactly like the real scheduled run (useful if the cron was
          # missed or you want to pick up where it left off). Only falls
          # back to a short 10-minute test window if that cutoff has
          # already passed for today (e.g. testing at night).
          TODAY_CUTOFF=$(date -u -d "today 09:38" +%s)
          NOW=$(date -u +%s)
          if [ "$TODAY_CUTOFF" -gt "$NOW" ]; then
            END_EPOCH=$TODAY_CUTOFF
          else
            END_EPOCH=$((NOW + 10*60))
          fi
          echo "Now: $(date -u -d @$NOW), target end: $(date -u -d @$END_EPOCH)"

          while [ "$(date -u +%s)" -lt "$END_EPOCH" ]; do
            echo "=== cycle at $(date -u +%H:%M:%S) UTC ==="
            python -m app.worker || echo "cycle failed, continuing to next tick"

            cd "$GITHUB_WORKSPACE"
            if [ -f data/snapshot.json ] && [ -n "$(git status --porcelain -- data/snapshot.json)" ]; then
              git add data/snapshot.json
              LAST_MSG=$(git log -1 --pretty=%s)
              if [ "$LAST_MSG" = "Update snapshot data [skip ci]" ]; then
                git commit --amend --no-edit
              else
                git commit -m "Update snapshot data [skip ci]"
              fi
              git push --force-with-lease || echo "snapshot push failed, continuing anyway"
              curl -s "https://purge.jsdelivr.net/gh/ksinha01/marketpulse-ai@main/data/snapshot.json" || echo "jsDelivr purge failed, continuing anyway"
            fi
            cd - > /dev/null

            sleep 30
          done
