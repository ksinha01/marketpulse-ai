name: marketpulse-worker

on:
  schedule:
    - cron: "*/19 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # needed so the worker can commit/push data/snapshot.json

concurrency:
  group: marketpulse-worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 21
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: worker
        run: pip install -r requirements.txt

      - name: Install UiPath CLI and Orchestrator tool
        run: |
          npm install -g @uipath/cli
          uip tools install @uipath/orchestrator-tool

      - name: Log in to UiPath (non-interactive, client credentials)
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_TENANT_NAME: ${{ secrets.UIPATH_TENANT_NAME }}
        run: |
          uip login --client-id "$UIPATH_CLIENT_ID" --client-secret "$UIPATH_CLIENT_SECRET" --tenant "$UIPATH_TENANT_NAME" --scope "OR.Assets" --output json
          uip login status --output json

      - name: Configure git identity for snapshot commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Loop the worker every 60s for ~20 minutes
        working-directory: worker
        env:
          ASSET_KEY: ${{ secrets.ASSET_KEY }}
          ASSET_FOLDER_PATH: ${{ secrets.ASSET_FOLDER_PATH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          SNAPSHOT_FILE: ${{ github.workspace }}/data/snapshot.json
        run: |
          END=$((SECONDS + 20*60))
          while [ $SECONDS -lt $END ]; do
            echo "=== cycle at $(date -u +%H:%M:%S) UTC ==="
            python -m app.worker || echo "cycle failed, continuing to next tick"

            cd "$GITHUB_WORKSPACE"
            if [ -f data/snapshot.json ] && [ -n "$(git status --porcelain -- data/snapshot.json)" ]; then
              git add data/snapshot.json
              LAST_MSG=$(git log -1 --pretty=%s)
              if [ "$LAST_MSG" = "Update snapshot data [skip ci]" ]; then
                git commit --amend --no-edit
              else
                git commit -m "Update snapshot data [skip ci]"
              fi
              git push --force-with-lease || echo "snapshot push failed, continuing anyway"
	      curl -s "https://purge.jsdelivr.net/gh/ksinha01/marketpulse-ai@main/data/snapshot.json" || echo "jsDelivr purge failed, continuing anyway"
            fi
            cd - > /dev/null

            sleep 60
          done
